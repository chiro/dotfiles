[colors]
background = #282A2E
background-alt = #373B41
foreground = #C5C8C6
primary = #F0C674
secondary = #8ABEB7
alert = #A54242
disabled = #707880

[bar/main]
width = 100%
height = 24pt
radius = 6

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 2pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = RictyDiminished:size=10;2
font-1 = Symbols Nerd Font Mono:size=12;2

modules-left = xworkspaces xwindow
modules-right = battery filesystem backlight pulseaudio memory cpu wlan eth date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; This module is not active by default (to enable it, add it to one of the
; modules-* list above).
; Please note that only a single tray can exist at any time. If you launch
; multiple bars with this module, only a single one will show it, the others
; will produce a warning. Which bar gets the module is timing dependent and can
; be quite random.
; For more information, see the documentation page for this module:
; https://polybar.readthedocs.io/en/stable/user/modules/tray.html
[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

; ${colors.x} does not get substituted when nested inside an inline %{F...}
; tag (only as a standalone option value), so this uses the literal hex.
label-mounted = %{T2}%{F#F0C674}ůįčä%{F-}%{T-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume = <ramp-volume> <label-volume>
ramp-volume-font = 2
ramp-volume-0 = ůįēŅ
ramp-volume-1 = ůįĖÄ
ramp-volume-2 = ůįēĺ
ramp-volume-foreground = ${colors.primary}

label-volume = %percentage%%

format-muted = <label-muted>
label-muted = ůįĚü
label-muted-font = 2
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "ůįćõ "
format-prefix-foreground = ${colors.primary}
format-prefix-font = 2
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "ůįĽ† "
format-prefix-foreground = ${colors.primary}
format-prefix-font = 2
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-disconnected = <label-disconnected>
; ${colors.x} does not get substituted when nested inside an inline %{F...}
; tag (only as a standalone option value), so this uses literal hex codes.
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected%{F-}

[module/wlan]
inherit = network-base
interface = wlp3s0
format-connected = <ramp-signal> <label-connected>
ramp-signal-font = 2
ramp-signal-0 = ůį§ü
ramp-signal-1 = ůį§Ę
ramp-signal-2 = ůį§•
ramp-signal-3 = ůį§®
ramp-signal-foreground = ${colors.primary}
label-connected = %essid%

[module/eth]
inherit = network-base
interface = enp2s0
; Hide the module entirely when the cable is unplugged, rather than
; burning bar space on "enp2s0 disconnected".
format-disconnected =
format-connected = <label-connected>
; ${colors.x} does not get substituted when nested inside an inline %{F...}
; tag (only as a standalone option value), so this uses the literal hex.
label-connected = %{T2}%{F#F0C674}ůįąÄ%{F-}%{T-} %local_ip%

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %{T2}ůįÖź%{T-} %date%
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true

[module/battery]
type = internal/battery
low-at = 10
battery = BAT0
adapter = AC
poll-interval = 5

format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full = <ramp-capacity> <label-full>

ramp-capacity-font = 2
ramp-capacity-0 = ůįĀļ
ramp-capacity-1 = ůįĀľ
ramp-capacity-2 = ůįĀĺ
ramp-capacity-3 = ůįāÄ
ramp-capacity-4 = ůįāā
ramp-capacity-foreground = ${colors.primary}

animation-charging-font = 2
animation-charging-0 = ůįāÜ
animation-charging-1 = ůįāą
animation-charging-2 = ůįāČ
animation-charging-3 = ůįāä
animation-charging-4 = ůįāÖ
animation-charging-foreground = ${colors.primary}

label-charging = %percentage%%
label-discharging = %percentage%%
label-full = Fully charged
label-low = BATTERY LOW

[module/backlight]
type = internal/backlight
card = amdgpu_bl1
; amdgpu's actual_brightness is on a different (lower) scale than the
; brightness file polybar writes to, which would throw off the displayed
; percentage. Read from brightness so the label matches brightnessctl.
use-actual-brightness = false
; Route scrolling through brightnessctl (same tool as the XF86MonBrightness
; keys in xmonad.hs) so both paths use the same step size and stay in sync.
scroll-up = brightnessctl set 5%+
scroll-down = brightnessctl set 5%-

format = <ramp> <label>
ramp-font = 2
ramp-0 = ůįÉö
ramp-1 = ůįÉõ
ramp-2 = ůįÉú
ramp-3 = ůįÉĚ
ramp-4 = ůįÉě
ramp-5 = ůįÉü
ramp-6 = ůįÉ†
ramp-foreground = ${colors.primary}

label = %percentage%%

; vim:ft=dosini
